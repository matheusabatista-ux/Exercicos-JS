<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var km  = Number(prompt('Digite o km percorrido'));
        var lts = Number(prompt('Digite o volume percorrido'));

        function calcularMedia(a,b){
            var media = a / b;
            return media;
        }

        var result = calcularMedia(km, lts);
        document.write(Math.round(result));
    </script>
</head>
