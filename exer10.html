!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 10 - IF ELSE</title>
</head>
<body>
    <script>
        var mes = prompt ('Digite a entrada');
        switch (mes){
            case '28':
            document.write('Fevereiro');
            break
             case '29':
            document.write('Fevereiro em ano bissexto');
            break
             case '30':
            document.write('Abril, Junho, Setembro e Novembro');
            break
             case '31':
            document.write('Janeiro, Março, Maio, Julho, Agosto, Outubro e Dezembro');
            break
             default:
            document.write('Entrade Errada');
        }
    </script>
    
</body>
</html>
