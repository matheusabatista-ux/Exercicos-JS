<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio ABC</title>
</head>

<body>
    <script>
        var nome = prompt('Qual é o seu nome');
        var salario = Number (prompt('Qual é o seu salário'));
        var venda = Number (prompt('Qual foi sua venda'));
        var comissao = 0;

        comissao = venda * 0.025;
        salario = salario + comissao;

        document.write(' h1Ola ' + nome + ' você ira receber ' + salario + ' esse mês<h1> ');

    </script>
</body>

</html>
