<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script>
    var conceito = prompt ('Conceito do aluno na disciplina')

    switch(conceito){
         case 'A':
            document.writeln('Exelente');
            break
            case'B':
             document.writeln('Ótimo');
                        break
            case'C':
             document.writeln('Bom');
                        break
            case'D':
             document.writeln('Regular');
                        break
            case'E':
             document.writeln('Ruim');
                        break
            case'F':
             document.writeln('Nos vemos no ano que vem');
             default:
                document.write('Entrada errada')
    }
    
</script>
</head>
