    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script>
        var valorIdade = prompt('Diga sua idade');

        if(valorIdade >= 0 && valorIdade < 15){
            document.write('Criança');
        }else if(valorIdade >= 15 && valorIdade < 30){
            document.write('Jovem');
        }else if(valorIdade >= 30 && valorIdade < 60){
            document.write('Adulto');
        }else if(valorIdade >= 60 && valorIdade < 95){
           document.write('Idoso');
        }        
    </script>
</head>
